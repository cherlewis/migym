<div class="bg-gray-900 rounded-3xl shadow-sm p-6 mb-24 border border-gray-800">
            <h2 class="text-white font-bold mb-3">💻 Tu código generado:</h2>
            <p class="text-xs text-gray-400 mb-3">Copia esto y pégalo en tu archivo rutinas.js</p>
            <textarea id="codigoGenerado" class="w-full h-32 bg-gray-800 text-green-400 p-3 rounded-xl text-sm font-mono outline-none" readonly></textarea>
        </div>

    </div>

    <script>
        // Le damos vida al botón de "Guardar Ejercicio" (asegúrate de ponerle id="btnGuardar" a tu botón del HTML)
        const btnGuardar = document.querySelector('button'); // Coge el primer botón (el de guardar)
        
        btnGuardar.addEventListener('click', function() {
            // 1. Recogemos lo que has escrito en el formulario (basado en los placeholder del diseño anterior)
            const inputs = document.querySelectorAll('input');
            const nombre = inputs[0].value || "Nuevo Ejercicio";
            const musculo = inputs[1].value || "General";
            const idFoto = inputs[2].value || "1";
            const series = inputs[3].value || "4";
            const reps = inputs[4].value || "10";
            const emoji = inputs[5].value || "💪";

            // 2. Generamos el texto exacto con formato JavaScript
            const nuevaLinea = `{ id: ${idFoto}, nombre: "${nombre}", musculo: "${musculo}", series: ${series}, repeticiones: ${reps}, peso: 0, emoji: "${emoji}" },`;

            // 3. Lo mostramos en la caja negra para que lo copies
            const cajaCodigo = document.getElementById('codigoGenerado');
            cajaCodigo.value = nuevaLinea;
            
            // Efecto visual: el botón cambia un segundo
            btnGuardar.innerHTML = "¡Código Generado! ✅";
            setTimeout(() => btnGuardar.innerHTML = "➕ Guardar Ejercicio", 2000);
        });
    </script>

    <script src="navbar.js"></script>
</body>
</html>
