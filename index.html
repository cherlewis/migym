<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Trainingym Personal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 font-sans">

    <div class="max-w-md mx-auto mt-6">
        <h1 class="text-3xl font-bold text-gray-800 text-center mb-6">Rutina de Hoy</h1>
        
        <div id="contenedor-ejercicios"></div>
    </div>

    <script src="rutinas.js"></script>
    
    <script>
        const contenedor = document.getElementById("contenedor-ejercicios");
        let tarjetasHTML = "";

        // Leemos la variable 'ejerciciosDeHoy' que viene de tu rutinas.js
        ejerciciosDeHoy.forEach(ejercicio => {
            tarjetasHTML += `
            <div class="bg-white rounded-3xl shadow-sm p-6 mb-5 border border-gray-100">
                <div class="flex justify-between items-center mb-5">
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">${ejercicio.nombre}</h2>
                        <p class="text-sm text-gray-500 mt-1">${ejercicio.musculo} • ${ejercicio.series} Series</p>
                    </div>
                    <div class="bg-blue-50 text-2xl rounded-2xl p-3">${ejercicio.emoji}</div>
                </div>
                
                <div class="flex gap-4 mb-5">
                    <div class="w-1/2">
                        <label class="text-xs text-gray-500 font-semibold mb-2 block uppercase tracking-wider">Peso (kg)</label>
                        <input type="number" placeholder="Ej: ${ejercicio.peso}" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs text-gray-500 font-semibold mb-2 block uppercase tracking-wider">Reps</label>
                        <input type="number" placeholder="Ej: ${ejercicio.repeticiones}" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
                    </div>
                </div>
                
                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition duration-200 shadow-md" onclick="alert('¡Has completado una serie de ${ejercicio.nombre}!')">
                    Guardar Serie
                </button>
            </div>
            `;
        });

        contenedor.innerHTML = tarjetasHTML;
    </script>

    <script src="navbar.js"></script>

</body>
</html>
